name: Daily GitHub Trending

on:
  schedule:
    # 每天 UTC 01:00 执行（北京时间 09:00）
    - cron: '0 1 * * *'
  workflow_dispatch:
    inputs:
      reason:
        description: '手动触发原因'
        required: false
        default: '手动执行'

jobs:
  scrape-and-commit:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip

    - name: Run scraper and sync to IMA
      env:
        IMA_CLIENT_ID: ${{ secrets.IMA_CLIENT_ID }}
        IMA_API_KEY: ${{ secrets.IMA_API_KEY }}
        IMA_KNOWLEDGE_BASE_ID: ${{ secrets.IMA_KNOWLEDGE_BASE_ID }}
      run: python scripts/github_trending.py

    - name: Commit and push
      run: |
        git config user.name "GitHub Actions Bot"
        git config user.email "actions@github.com"
        git add github_trending/
        # 只在有变更时提交
        if git diff --cached --quiet; then
          echo "没有新的变更，跳过提交"
        else
          git commit -m "docs: update GitHub trending $(date +%Y-%m-%d)"
          # 先拉取远程更新避免冲突
          git pull --rebase origin main || git pull origin main
          git push
        fi
